services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
      - ./recordings:/recordings

  ctrl-server:
    build: ./ctrl-server
    restart: unless-stopped
    network_mode: host
    environment:
      - LISTEN_ADDR=${TAILSCALE_IP}:8080
      - SNAPSHOT_DIR=/data/snapshots
      - RECORD_DIR=/recordings
      # mediamtx binds the Tailscale IP (see mediamtx.yml), not loopback
      - RTSP_URL=rtsp://${TAILSCALE_IP}:8554/cam
      # local wall-clock for the burned-in recording timestamps
      - TZ=${TZ:-UTC}
    volumes:
      - /data/snapshots:/data/snapshots
      - ./recordings:/recordings
